<!DOCTYPE html>
<html>
<head>
    <title>Hotel Management System</title>
    <style>
        body {
            font-family: Arial;
            padding: 20px;
        }
        input, select, button {
            margin: 5px;
            padding: 8px;
        }
        textarea {
            width: 100%;
            height: 150px;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <h2>Hotel Management System</h2>

    <label>Room Number:</label>
    <input type="number" id="roomNo"><br>

    <label>Room Type:</label>
    <select id="type">
        <option>Single</option>
        <option>Double</option>
        <option>Deluxe</option>
    </select><br>

    <label>Price:</label>
    <input type="number" id="price"><br>

    <label>Customer Name:</label>
    <input type="text" id="customer"><br>

    <label>Contact:</label>
    <input type="text" id="contact"><br>

    <br>

    <button onclick="addRoom()">Add Room</button>
    <button onclick="viewRooms()">View Rooms</button>
    <button onclick="bookRoom()">Book Room</button>
    <button onclick="checkoutRoom()">Checkout</button>

    <textarea id="display" readonly></textarea>
    <p id="message"></p>

<script>
    // Store rooms
    let rooms = [];

    // Add Room
    function addRoom() {
        let roomNo = document.getElementById("roomNo").value;
        let type = document.getElementById("type").value;
        let price = document.getElementById("price").value;

        rooms.push({
            roomNumber: parseInt(roomNo),
            type: type,
            price: parseFloat(price),
            available: true
        });

        document.getElementById("message").innerText = "Room Added!";
    }

    // View Rooms
    function viewRooms() {
        let display = document.getElementById("display");
        display.value = "";

        rooms.forEach(r => {
            display.value += 
                `Room: ${r.roomNumber} | Type: ${r.type} | Price: ${r.price} | Available: ${r.available}\n`;
        });
    }

    // Book Room
    function bookRoom() {
        let roomNo = parseInt(document.getElementById("roomNo").value);
        let customer = document.getElementById("customer").value;

        let found = false;

        rooms.forEach(r => {
            if (r.roomNumber === roomNo) {
                found = true;
                if (r.available) {
                    r.available = false;
                    document.getElementById("message").innerText = "Room booked for " + customer;
                } else {
                    document.getElementById("message").innerText = "Already booked!";
                }
            }
        });

        if (!found) {
            document.getElementById("message").innerText = "Room not found!";
        }
    }

    // Checkout
    function checkoutRoom() {
        let roomNo = parseInt(document.getElementById("roomNo").value);

        rooms.forEach(r => {
            if (r.roomNumber === roomNo) {
                r.available = true;
                document.getElementById("message").innerText = "Checked out!";
            }
        });
    }
</script>

</body>
</html>
